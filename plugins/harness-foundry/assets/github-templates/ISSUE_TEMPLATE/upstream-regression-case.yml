name: Upstream regression case
description: Propose a sanitized downstream case for upstream harness-foundry improvement.
title: "[harness-regression] "
labels:
  - harness-regression
body:
  - type: input
    id: affected_domain
    attributes:
      label: Source domain pattern
      description: Use a generic domain name when the original project name is private.
      placeholder: billing-operations
    validations:
      required: true
  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - development
        - non-development
        - mixed
    validations:
      required: true
  - type: textarea
    id: sanitized_reproduction
    attributes:
      label: Sanitized reproduction
      description: Provide synthetic files or excerpts that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected_rule
    attributes:
      label: Expected upstream change
      description: Name the fixture, validator rule, template change, or skill boundary change.
    validations:
      required: true
  - type: checkboxes
    id: privacy_sanitization_check
    attributes:
      label: Privacy and sanitization check
      options:
        - label: This case has removed secrets, credentials, customer data, private source code, internal documents, and unreleased strategy.
          required: true
