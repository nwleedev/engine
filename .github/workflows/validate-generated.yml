name: validate-generated

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/build_plugins.py
      - run: python tools/validate_generated.py
      - run: pytest
      - run: git diff --exit-code
