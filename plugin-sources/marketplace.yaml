name: engine
display_name: Engine plugin suite
description: Codex and Claude Code plugin suite for session continuity, quality gates, shared skills, shared subagents, domain harness design, and Deep Research prompt generation
owner:
  name: nwleedev
plugins:
  - id: session-memory
    version: 0.5.1
    description: Project-scoped session continuity for Codex and Claude Code with checkpoint, resume, status, and monorepo-safe artifact storage
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: session-memory
        path: ./plugins/claude/session-memory
      codex:
        name: session-memory
        skills: ./skills/
        path: ./plugins/codex/session-memory
  - id: quality-guard
    version: 0.2.3
    description: Quality gate helpers that catch superficial work, vague responses, and missing AGENTS.md guidance
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: quality-guard
        path: ./plugins/claude/quality-guard
      codex:
        name: quality-guard
        skills: ./skills/
        path: ./plugins/codex/quality-guard
  - id: shared-subagents
    version: 0.2.6
    description: Reusable Codex subagent templates for mapping, reviewing, security auditing, and spec checks
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: shared-subagents
        path: ./plugins/claude/shared-subagents
      codex:
        name: shared-subagents
        skills: ./skills/
        path: ./plugins/codex/shared-subagents
  - id: shared-skills
    version: 0.2.6
    description: Reusable main-session quality gates for comments, TDD, planning, reviews, verification, and disciplined implementation
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: shared-skills
        path: ./plugins/claude/shared-skills
      codex:
        name: shared-skills
        skills: ./skills/
        path: ./plugins/codex/shared-skills
  - id: harness-foundry
    version: 0.3.2
    description: Skill workflows for diagnosing project domains and designing, scaffolding, and auditing domain harnesses
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: harness-foundry
        path: ./plugins/claude/harness-foundry
      codex:
        name: harness-foundry
        skills: ./skills/
        path: ./plugins/codex/harness-foundry
  - id: research-prompt
    version: 0.1.1
    description: Generate ChatGPT Deep Research prompt artifacts from live project context without external API calls
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: research-prompt
        path: ./plugins/claude/research-prompt
      codex:
        name: research-prompt
        skills: ./skills/
        path: ./plugins/codex/research-prompt
