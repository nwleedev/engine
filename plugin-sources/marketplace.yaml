name: engine
display_name: Engine plugin suite
description: Codex and Claude Code plugin suite for session continuity, quality gates, shared skills, shared subagents, domain harness design, and Deep Research prompt generation
owner:
  name: nwleedev
plugins:
  - id: session-memory
    version: 0.5.4
    description: Project-scoped session continuity for Codex and Claude Code with checkpoint, resume, status, and monorepo-safe artifact storage
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: session-memory
        path: ./plugins/claude/session-memory
      codex:
        name: session-memory
        skills: ./skills/
        path: ./plugins/codex/session-memory
  - id: quality-guard
    version: 0.2.4
    description: Quality gate helpers that catch superficial work, vague responses, and missing AGENTS.md guidance
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: quality-guard
        path: ./plugins/claude/quality-guard
      codex:
        name: quality-guard
        skills: ./skills/
        path: ./plugins/codex/quality-guard
  - id: shared-subagents
    version: 0.2.9
    description: Reusable Codex and Claude Code subagent templates for workflow routing, requirement review, test adequacy, closure, risk, code review, and security audit
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: shared-subagents
        path: ./plugins/claude/shared-subagents
      codex:
        name: shared-subagents
        skills: ./skills/
        path: ./plugins/codex/shared-subagents
  - id: shared-skills
    version: 0.2.7
    description: Reusable Codex and Claude Code workflow skills for requirements traceability, research evidence, scenario-based tests, implementation evidence, and verification gates
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: shared-skills
        path: ./plugins/claude/shared-skills
      codex:
        name: shared-skills
        skills: ./skills/
        path: ./plugins/codex/shared-skills
  - id: harness-foundry
    version: 0.3.2
    description: Skill workflows for diagnosing project domains and designing, scaffolding, and auditing domain harnesses
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: harness-foundry
        path: ./plugins/claude/harness-foundry
      codex:
        name: harness-foundry
        skills: ./skills/
        path: ./plugins/codex/harness-foundry
  - id: deep-research-prompt-export
    version: 0.2.0
    description: ChatGPT Deep Research prompt export bridge that generates source-backed handoff prompts from live project context without calling external APIs
    license: MIT
    category: Productivity
    harnesses:
      claude:
        name: deep-research-prompt-export
        path: ./plugins/claude/deep-research-prompt-export
      codex:
        name: deep-research-prompt-export
        skills: ./skills/
        path: ./plugins/codex/deep-research-prompt-export
